<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沧海拾贝</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #e8f5e9 50%, #b3e5fc 100%);
      min-height: 100vh;
      padding: 20px;
      color: #374151;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 40px 0 30px;
    }

    header h1 {
      font-size: 2.2rem;
      background: linear-gradient(90deg, #0ea5e9, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    header p {
      color: #64748b;
      font-size: 0.95rem;
    }

    .post-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(14, 165, 233, 0.12);
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: rgba(255, 255, 255, 0.9);
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    .input-group textarea {
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }

    .char-count {
      text-align: right;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .char-count.warning {
      color: #f59e0b;
    }

    .char-count.error {
      color: #ef4444;
    }

    .upload-area {
      border: 2px dashed #94a3b8;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.6);
      margin-bottom: 12px;
    }

    .upload-area:hover {
      border-color: #38bdf8;
      background: rgba(56, 189, 248, 0.05);
    }

    .upload-area input {
      display: none;
    }

    .upload-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .upload-text {
      color: #64748b;
      font-size: 0.9rem;
    }

    .upload-hint {
      color: #94a3b8;
      font-size: 0.75rem;
      margin-top: 4px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .preview-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .preview-remove:hover {
      background: rgba(239, 68, 68, 0.9);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #0ea5e9, #10b981);
      color: white;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(14, 165, 233, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 8px;
    }

    .feed-header h2 {
      font-size: 1.2rem;
      color: #334155;
    }

    .feed-count {
      font-size: 0.85rem;
      color: #64748b;
      background: rgba(255, 255, 255, 0.7);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .shell-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 4px 20px rgba(14, 165, 233, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.7);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shell-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .shell-author {
      font-weight: 600;
      color: #0f172a;
      font-size: 1rem;
    }

    .shell-time {
      font-size: 0.8rem;
      color: #64748b;
      cursor: pointer;
      margin-top: 2px;
      user-select: none;
    }

    .shell-time:hover {
      color: #0ea5e9;
    }

    .shell-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.85rem;
    }

    .icon-btn:hover {
      background: rgba(148, 163, 184, 0.12);
    }

    .icon-btn.delete:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.08);
    }

    .icon-btn.like.active {
      color: #ec4899;
    }

    .icon-btn.like.active:hover {
      background: rgba(236, 72, 153, 0.08);
    }

    .shell-content {
      color: #334155;
      line-height: 1.7;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .shell-images {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .shell-images.single {
      grid-template-columns: 1fr;
      max-width: 280px;
    }

    .shell-images.two {
      grid-template-columns: repeat(2, 1fr);
    }

    .shell-image {
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .shell-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .shell-image:hover img {
      transform: scale(1.05);
    }

    .shell-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(226, 232, 240, 0.8);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .empty-text {
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .empty-hint {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
      object-fit: contain;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(15, 23, 42, 0.9);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1001;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 480px) {
      body { padding: 12px; }
      header h1 { font-size: 1.8rem; }
      .post-card { padding: 18px; }
      .preview-grid,
      .shell-images { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .shell-images.single { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🐚 沧海拾贝</h1>
      <p>拾起生活里的每一枚闪光贝壳</p>
    </header>

    <div class="post-card">
      <div class="input-group">
        <label for="nickname">昵称</label>
        <input type="text" id="nickname" placeholder="给自己起个名字吧" maxlength="20">
      </div>

      <div class="input-group">
        <label for="content">想说的话</label>
        <textarea id="content" placeholder="写下此刻的心情..." maxlength="1000"></textarea>
        <div class="char-count" id="charCount">0 / 1000</div>
      </div>

      <div class="upload-area" id="uploadArea">
        <input type="file" id="imageInput" accept="image/*" multiple>
        <div class="upload-icon">📷</div>
        <div class="upload-text">点击上传图片</div>
        <div class="upload-hint">最多 9 张，建议单张不超过 1MB</div>
      </div>

      <div class="preview-grid" id="previewGrid"></div>

      <button type="button" class="submit-btn" id="submitBtn">🌊 拾取贝壳</button>
    </div>

    <div class="feed-header">
      <h2>海滩足迹</h2>
      <span class="feed-count" id="feedCount">0 枚贝壳</span>
    </div>

    <div id="feed"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <img src="" alt="预览" id="lightboxImg">
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'canghai_shells';
    const MAX_IMAGES = 9;
    const MAX_CONTENT = 1000;

    const nicknameInput = document.getElementById('nickname');
    const contentInput = document.getElementById('content');
    const charCount = document.getElementById('charCount');
    const imageInput = document.getElementById('imageInput');
    const uploadArea = document.getElementById('uploadArea');
    const previewGrid = document.getElementById('previewGrid');
    const submitBtn = document.getElementById('submitBtn');
    const feed = document.getElementById('feed');
    const feedCount = document.getElementById('feedCount');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const toast = document.getElementById('toast');

    let pendingImages = [];

    function isStorageAvailable() {
      try {
        const test = '__storage_test__';
        localStorage.setItem(test, test);
        localStorage.removeItem(test);
        return true;
      } catch (e) {
        return false;
      }
    }

    function loadShells() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveShells(shells) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(shells));
        return true;
      } catch (e) {
        if (e.name === 'QuotaExceededError' || e.code === 22) {
          throw new Error('本地存储空间已满，请减少图片数量或删除部分贝壳后再试。');
        }
        throw e;
      }
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function formatTime(dateString, showExact) {
      const date = new Date(dateString);
      if (showExact) {
        return date.toLocaleString('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });
      }
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      if (diff < 60) return '刚刚';
      if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
      if (diff < 604800) return `${Math.floor(diff / 86400)}天前`;
      return date.toLocaleDateString('zh-CN');
    }

    function compressImage(file, maxWidth = 1280, quality = 0.8) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = Math.round(height * maxWidth / width);
              width = maxWidth;
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = () => reject(new Error('图片加载失败'));
          img.src = event.target.result;
        };
        reader.onerror = () => reject(new Error('图片读取失败'));
        reader.readAsDataURL(file);
      });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function updateCharCount() {
      const len = contentInput.value.length;
      charCount.textContent = `${len} / ${MAX_CONTENT}`;
      charCount.className = 'char-count';
      if (len >= MAX_CONTENT) charCount.classList.add('error');
      else if (len >= MAX_CONTENT * 0.9) charCount.classList.add('warning');
    }

    function updatePreview() {
      previewGrid.innerHTML = '';
      pendingImages.forEach((src, index) => {
        const item = document.createElement('div');
        item.className = 'preview-item';
        item.innerHTML = `
          <img src="${src}" alt="预览">
          <button class="preview-remove" data-index="${index}">×</button>
        `;
        previewGrid.appendChild(item);
      });

      previewGrid.querySelectorAll('.preview-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          pendingImages.splice(parseInt(btn.dataset.index), 1);
          updatePreview();
          updateUploadHint();
        });
      });
    }

    function updateUploadHint() {
      const remaining = MAX_IMAGES - pendingImages.length;
      const hint = uploadArea.querySelector('.upload-hint');
      hint.textContent = remaining > 0 ? `还可上传 ${remaining} 张，建议单张不超过 1MB` : '已达到上传上限';
    }

    async function handleImageSelect(files) {
      const remainingSlots = MAX_IMAGES - pendingImages.length;
      if (remainingSlots <= 0) {
        showToast('最多只能上传 9 张图片');
        return;
      }

      const validFiles = Array.from(files).filter(f => f.type.startsWith('image/')).slice(0, remainingSlots);

      if (validFiles.length === 0) {
        showToast('请选择图片文件');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '图片处理中...';

      try {
        for (const file of validFiles) {
          const compressed = await compressImage(file);
          pendingImages.push(compressed);
          updatePreview();
          updateUploadHint();
        }

        if (files.length > remainingSlots) {
          showToast(`只保留了前 ${remainingSlots} 张图片`);
        }
      } catch (err) {
        showToast('图片处理失败：' + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '🌊 拾取贝壳';
      }
    }

    function renderFeed() {
      const shells = loadShells().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      feedCount.textContent = `${shells.length} 枚贝壳`;

      if (shells.length === 0) {
        feed.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🏖️</div>
            <div class="empty-text">海滩还空空如也</div>
            <div class="empty-hint">快来拾取第一枚贝壳吧~</div>
          </div>
        `;
        return;
      }

      feed.innerHTML = shells.map(shell => {
        const imageClass = shell.images.length === 1 ? 'single' : shell.images.length === 2 ? 'two' : '';
        const imagesHtml = shell.images.length > 0
          ? `<div class="shell-images ${imageClass}">
              ${shell.images.map(src => `<div class="shell-image"><img src="${src}" alt="贝壳图片"></div>`).join('')}
             </div>`
          : '';

        return `
          <div class="shell-card" data-id="${shell.id}">
            <div class="shell-header">
              <div>
                <div class="shell-author">${escapeHtml(shell.nickname || '匿名拾贝人')}</div>
                <div class="shell-time" data-time="${shell.createdAt}" title="点击切换时间格式">${formatTime(shell.createdAt, false)}</div>
              </div>
              <div class="shell-actions">
                <button class="icon-btn like ${shell.liked ? 'active' : ''}" data-id="${shell.id}">
                  <span>${shell.liked ? '❤️' : '🤍'}</span>
                  <span>${shell.likes || 0}</span>
                </button>
                <button class="icon-btn delete" data-id="${shell.id}" title="删除">
                  🗑️
                </button>
              </div>
            </div>
            <div class="shell-content">${escapeHtml(shell.content)}</div>
            ${imagesHtml}
          </div>
        `;
      }).join('');

      bindFeedEvents();
    }

    function bindFeedEvents() {
      feed.querySelectorAll('.shell-time').forEach(el => {
        let showExact = false;
        el.addEventListener('click', () => {
          showExact = !showExact;
          el.textContent = formatTime(el.dataset.time, showExact);
        });
      });

      feed.querySelectorAll('.icon-btn.like').forEach(btn => {
        btn.addEventListener('click', () => {
          const shells = loadShells();
          const shell = shells.find(s => s.id === btn.dataset.id);
          if (!shell) return;
          shell.liked = !shell.liked;
          shell.likes = Math.max(0, (shell.likes || 0) + (shell.liked ? 1 : -1));
          saveShells(shells);
          renderFeed();
        });
      });

      feed.querySelectorAll('.icon-btn.delete').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!confirm('确定要收起这枚贝壳吗？')) return;
          const shells = loadShells().filter(s => s.id !== btn.dataset.id);
          saveShells(shells);
          renderFeed();
          showToast('贝壳已收起');
        });
      });

      feed.querySelectorAll('.shell-image').forEach(imgWrap => {
        imgWrap.addEventListener('click', () => {
          lightboxImg.src = imgWrap.querySelector('img').src;
          lightbox.classList.add('active');
        });
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    contentInput.addEventListener('input', updateCharCount);

    uploadArea.addEventListener('click', () => imageInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#38bdf8';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '#94a3b8';
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#94a3b8';
      handleImageSelect(e.dataTransfer.files);
    });

    imageInput.addEventListener('change', () => {
      handleImageSelect(imageInput.files);
      imageInput.value = '';
    });

    submitBtn.addEventListener('click', async () => {
      const nickname = nicknameInput.value.trim();
      const content = contentInput.value.trim();

      if (!nickname) {
        showToast('请输入昵称');
        nicknameInput.focus();
        return;
      }

      if (!content) {
        showToast('写下想说的话吧');
        contentInput.focus();
        return;
      }

      if (content.length > MAX_CONTENT) {
        showToast(`内容不能超过 ${MAX_CONTENT} 字`);
        contentInput.focus();
        return;
      }

      const shells = loadShells();
      shells.push({
        id: generateId(),
        nickname,
        content,
        images: pendingImages,
        likes: 0,
        liked: false,
        createdAt: new Date().toISOString()
      });

      try {
        saveShells(shells);
      } catch (err) {
        showToast('发布失败：' + err.message);
        return;
      }

      nicknameInput.value = '';
      contentInput.value = '';
      pendingImages = [];
      updateCharCount();
      updatePreview();
      updateUploadHint();
      renderFeed();
      showToast('贝壳已拾起 🐚');
    });

    lightbox.addEventListener('click', () => {
      lightbox.classList.remove('active');
    });

    setInterval(() => {
      feed.querySelectorAll('.shell-time').forEach(el => {
        if (!el.dataset.showExact) {
          el.textContent = formatTime(el.dataset.time, false);
        }
      });
    }, 60000);

    window.addEventListener('error', (e) => {
      console.error('页面错误:', e.error);
      showToast('发生错误，请刷新页面重试');
    });

    if (!isStorageAvailable()) {
      showToast('当前环境不支持本地存储，请使用现代浏览器或通过 HTTP 访问');
      submitBtn.disabled = true;
    }

    updateCharCount();
    updateUploadHint();
    renderFeed();
  </script>
</body>
</html>
